<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FF UID Checker | Esports Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700&family=Oxanium:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #ff0040;
            --primary-glow: rgba(255, 0, 64, 0.6);
            --bg-black: #050505;
            --card-bg: rgba(20, 20, 20, 0.85);
            --text-white: #ffffff;
            --text-gray: #b0b0b0;
            --glass: rgba(255, 255, 255, 0.05);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-black); color: var(--text-white); font-family: 'Exo 2', sans-serif; overflow-x: hidden; min-height: 100vh; }

        /* Animated Particles */
        .bg-animate { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; }
        .particle { position: absolute; background: var(--primary); border-radius: 50%; filter: blur(5px); opacity: 0.15; animation: float 15s infinite linear; }
        @keyframes float { 0% { transform: translateY(100vh) scale(0); } 100% { transform: translateY(-10vh) scale(1.5); } }

        .app-container { max-width: 480px; margin: 0 auto; padding: 20px; padding-bottom: 90px; }
        .section { display: none; animation: fadeIn 0.4s ease-out; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        header { text-align: center; padding: 40px 0 20px; }
        header h1 { font-family: 'Oxanium', sans-serif; font-weight: 800; font-size: 26px; color: var(--primary); text-shadow: 0 0 15px var(--primary-glow); text-transform: uppercase; letter-spacing: 1px; }

        .input-group { margin-bottom: 20px; }
        .neon-input {
            width: 100%; background: var(--glass); border: 2px solid rgba(255,255,255,0.1); border-radius: 12px;
            padding: 18px; color: white; font-family: 'Oxanium', sans-serif; font-size: 18px; outline: none; transition: var(--transition);
        }
        .neon-input:focus { border-color: var(--primary); box-shadow: 0 0 20px var(--primary-glow); background: rgba(255,0,64,0.05); }

        .btn-search {
            width: 100%; background: var(--primary); color: white; border: none; border-radius: 12px;
            padding: 16px; font-family: 'Oxanium', sans-serif; font-weight: 700; font-size: 18px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            box-shadow: 0 5px 20px rgba(255, 0, 64, 0.4); transition: var(--transition);
        }
        .btn-search:disabled { opacity: 0.6; cursor: wait; }
        .btn-search:active:not(:disabled) { transform: scale(0.96); }

        /* Loader */
        #loader { display: none; text-align: center; margin: 25px 0; }
        .spinner { width: 45px; height: 45px; border: 4px solid var(--glass); border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 10px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Card Styles */
        .result-card {
            background: var(--card-bg); border: 1px solid var(--primary); border-radius: 20px; padding: 30px;
            text-align: center; position: relative; overflow: hidden; animation: glowPulse 2s infinite alternate;
        }
        @keyframes glowPulse { from { box-shadow: 0 0 10px rgba(255,0,64,0.1); } to { box-shadow: 0 0 30px rgba(255,0,64,0.3); } }
        
        .nickname-text { font-family: 'Oxanium', sans-serif; font-size: 30px; font-weight: 800; margin: 10px 0; letter-spacing: 1px; }
        .uid-subtext { color: var(--text-gray); font-size: 14px; margin-bottom: 20px; }

        .btn-copy { background: var(--glass); color: white; border: 1px solid rgba(255,255,255,0.1); padding: 12px 25px; border-radius: 10px; font-size: 14px; cursor: pointer; width: 100%; font-weight: 600; }

        /* History */
        .history-item { background: var(--glass); margin-bottom: 12px; padding: 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--primary); cursor: pointer; }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(5,5,5,0.95); backdrop-filter: blur(15px); display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid rgba(255,255,255,0.05); z-index: 1000; }
        .nav-item { color: var(--text-gray); display: flex; flex-direction: column; align-items: center; font-size: 11px; gap: 4px; cursor: pointer; transition: 0.3s; }
        .nav-item.active { color: var(--primary); }

        /* Toasts */
        #toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: var(--primary); color: white; padding: 12px 30px; border-radius: 50px; font-weight: bold; display: none; z-index: 2000; animation: slideUp 0.3s; }
        @keyframes slideUp { from { opacity: 0; bottom: 70px; } to { opacity: 1; bottom: 100px; } }

        #offline-warn { background: #ff3333; color: white; text-align: center; padding: 6px; font-size: 13px; display: none; position: sticky; top: 0; z-index: 1100; }
    </style>
</head>
<body>

    <div class="bg-animate" id="particles"></div>
    <div id="offline-warn"><i class="fas fa-wifi-slash"></i> No Internet Connection</div>

    <div class="app-container">
        <header>
            <h1>FF Nickname Checker</h1>
            <p style="color:var(--text-gray); font-size: 11px; letter-spacing: 1px; margin-top: 5px;">BANGLADESH SERVER PREMIUM</p>
        </header>

        <div id="home-sec" class="section active">
            <div class="input-group">
                <input type="number" id="uid-input" class="neon-input" placeholder="Enter Free Fire UID" inputmode="numeric">
            </div>
            <button class="btn-search" id="search-btn" onclick="fetchNickname()">
                <i class="fas fa-bolt"></i> <span id="btn-text">CHECK NOW</span>
            </button>

            <div id="loader">
                <div class="spinner"></div>
                <p style="font-family: Oxanium; font-size: 14px;">Searching Database...</p>
            </div>

            <div id="display-area" style="margin-top: 30px;"></div>
        </div>

        <div id="history-sec" class="section">
            <h2 style="font-family: Oxanium; margin-bottom: 20px;">Recent Checks</h2>
            <div id="history-list"></div>
        </div>

        <div id="about-sec" class="section">
            <div class="result-card" style="text-align: left; animation: none;">
                <h3 style="color:var(--primary); margin-bottom: 10px;">Information</h3>
                <p style="font-size: 14px; color: var(--text-gray); line-height: 1.6;">
                    This app uses a private PHP-based proxy system to ensure 99.9% uptime and fast results.
                </p>
                <div style="margin-top: 20px;">
                    <p><i class="fas fa-check-circle" style="color:var(--primary)"></i> BD Server Support</p>
                    <p><i class="fas fa-check-circle" style="color:var(--primary)"></i> No CORS Issues</p>
                    <p><i class="fas fa-check-circle" style="color:var(--primary)"></i> High Speed Proxy</p>
                </div>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="navTo('home', this)"><i class="fas fa-home"></i><span>Home</span></div>
        <div class="nav-item" onclick="navTo('history', this)"><i class="fas fa-history"></i><span>History</span></div>
        <div class="nav-item" onclick="navTo('about', this)"><i class="fas fa-shield-alt"></i><span>About</span></div>
    </nav>

    <div id="toast"></div>

    <script>
        // Particles Background
        const partBox = document.getElementById('particles');
        for(let i=0; i<12; i++) {
            let p = document.createElement('div');
            p.className = 'particle';
            p.style.width = p.style.height = Math.random() * 8 + 4 + 'px';
            p.style.left = Math.random() * 100 + 'vw';
            p.style.animationDuration = (Math.random() * 10 + 10) + 's';
            p.style.animationDelay = Math.random() * 5 + 's';
            partBox.appendChild(p);
        }

        // Navigation
        function navTo(id, el) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id + '-sec').classList.add('active');
            el.classList.add('active');
            if(id === 'history') renderHistory();
            vibrate(10);
        }

        // API Fetching
        async function fetchNickname() {
            const input = document.getElementById('uid-input');
            const uid = input.value.trim();
            const btn = document.getElementById('search-btn');
            const display = document.getElementById('display-area');
            const loader = document.getElementById('loader');

            // Validation
            if(!uid || uid.length < 5 || uid.length > 15) {
                showToast("Enter a valid FF UID!");
                vibrate([50, 50]);
                return;
            }

            // UI Reset
            display.innerHTML = "";
            loader.style.display = "block";
            btn.disabled = true;
            vibrate(20);

            try {
                // IMPORTANT: Call your own api.php file
                const response = await fetch(`api.php?uid=${uid}`);
                const data = await response.json();
                
                loader.style.display = "none";
                btn.disabled = false;

                // Extraction Logic
                let nick = data.nickname || (data.data && data.data.nickname);

                if(nick && nick !== "null") {
                    showSuccess(uid, nick);
                    saveHistory(uid, nick);
                } else {
                    showError("Player Not Found!");
                }
            } catch (err) {
                loader.style.display = "none";
                btn.disabled = false;
                showError("Request Timeout / Server Error");
            }
        }

        function showSuccess(uid, nick) {
            document.getElementById('display-area').innerHTML = `
                <div class="result-card">
                    <div class="uid-subtext">PLAYER UID: ${uid}</div>
                    <div class="nickname-text">${nick}</div>
                    <button class="btn-copy" onclick="copyNick('${nick}')">
                        <i class="fas fa-copy"></i> COPY NICKNAME
                    </button>
                </div>
            `;
        }

        function showError(msg) {
            document.getElementById('display-area').innerHTML = `
                <div class="result-card" style="border-color: #ff3333; animation: none;">
                    <i class="fas fa-exclamation-circle" style="font-size: 40px; color: #ff3333; margin-bottom: 15px;"></i>
                    <p style="font-weight: bold; font-family: Oxanium;">${msg}</p>
                </div>
            `;
        }

        // Utils
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.display = "block";
            setTimeout(() => t.style.display = "none", 2500);
        }

        function copyNick(text) {
            navigator.clipboard.writeText(text);
            showToast("Copied to Clipboard!");
            vibrate(15);
        }

        function vibrate(val) {
            if(navigator.vibrate) navigator.vibrate(val);
        }

        function saveHistory(uid, nick) {
            let h = JSON.parse(localStorage.getItem('ff_hist') || '[]');
            h = h.filter(x => x.uid !== uid);
            h.unshift({uid, nick});
            if(h.length > 8) h.pop();
            localStorage.setItem('ff_hist', JSON.stringify(h));
        }

        function renderHistory() {
            const list = document.getElementById('history-list');
            const h = JSON.parse(localStorage.getItem('ff_hist') || '[]');
            if(h.length === 0) {
                list.innerHTML = "<p style='color:gray; text-align:center;'>No history found.</p>";
                return;
            }
            list.innerHTML = h.map(i => `
                <div class="history-item" onclick="loadHistItem('${i.uid}')">
                    <div>
                        <div style="color:var(--primary); font-weight:bold;">${i.nick}</div>
                        <div style="font-size:12px; color:gray;">UID: ${i.uid}</div>
                    </div>
                    <i class="fas fa-arrow-right" style="opacity:0.3;"></i>
                </div>
            `).join('');
        }

        function loadHistItem(uid) {
            document.getElementById('uid-input').value = uid;
            navTo('home', document.querySelector('.nav-item'));
            fetchNickname();
        }

        window.addEventListener('online', () => document.getElementById('offline-warn').style.display='none');
        window.addEventListener('offline', () => document.getElementById('offline-warn').style.display='block');
    </script>
</body>
</html>
