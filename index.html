<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Gamer Lookup</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700&family=Oxanium:wght@400;600&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #8a2be2;
            --secondary: #00d2ff;
            --bg-dark: #0f0c29;
            --glass: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --success: #00ff88;
            --error: #ff4b2b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Exo 2', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            padding: 20px;
        }

        /* Animated Background Particles */
        .particles {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        /* Glass Card */
        .container {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-family: 'Oxanium', sans-serif;
            text-align: center;
            font-size: 1.8rem;
            margin-bottom: 25px;
            background: linear-gradient(to right, var(--secondary), var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Online Status */
        .status-bar {
            text-align: right;
            font-size: 0.8rem;
            margin-bottom: 10px;
            color: var(--success);
        }

        /* Input Section */
        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--glass-border);
            padding: 15px 45px 15px 15px;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            transition: 0.3s;
            outline: none;
        }

        input:focus {
            border-color: var(--secondary);
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.3);
        }

        .clear-btn {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #ccc;
            display: none;
        }

        /* Buttons */
        .btn-glow {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: white;
            font-weight: bold;
            font-family: 'Oxanium', sans-serif;
            cursor: pointer;
            transition: 0.4s;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-glow:hover:not(:disabled) {
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(138, 43, 226, 0.6);
        }

        .btn-glow:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* Result Section */
        .result-card {
            margin-top: 25px;
            padding: 20px;
            background: rgba(0,0,0,0.4);
            border-radius: 15px;
            display: none;
            text-align: center;
            border: 1px solid var(--glass-border);
        }

        .result-card.success { border-color: var(--success); display: block; animation: zoomIn 0.4s; }
        .result-card.error { border-color: var(--error); display: block; }

        @keyframes zoomIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .player-name {
            font-size: 1.5rem;
            color: var(--success);
            font-weight: bold;
            margin-bottom: 10px;
            display: block;
        }

        .uid-display {
            font-size: 0.9rem;
            color: #aaa;
            margin-bottom: 15px;
        }

        .action-btns {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 15px;
        }

        .icon-btn {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.2s;
        }

        .icon-btn:hover { background: rgba(255,255,255,0.2); }

        /* History Section */
        .history-section {
            margin-top: 25px;
            border-top: 1px solid var(--glass-border);
            padding-top: 15px;
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-size: 0.85rem;
            color: #bbb;
        }

        .history-list {
            max-height: 150px;
            overflow-y: auto;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            margin-bottom: 5px;
            font-size: 0.8rem;
            cursor: pointer;
        }

        /* Loading Spinner */
        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 12px 25px;
            border-radius: 50px;
            font-size: 0.9rem;
            display: none;
            z-index: 1000;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

<canvas class="particles" id="canvas"></canvas>

<div class="container">
    <div class="status-bar" id="online-status">
        <i class="fas fa-circle"></i> Online
    </div>
    
    <h1><i class="fas fa-gamepad"></i> Gamer Lookup</h1>

    <div class="input-group">
        <input type="number" id="uid-input" placeholder="Enter Free Fire UID..." autocomplete="off">
        <i class="fas fa-times-circle clear-btn" id="clear-input"></i>
    </div>

    <button class="btn-glow" id="search-btn">
        <span id="btn-text">SEARCH PLAYER</span>
        <div class="spinner" id="loading-spinner"></div>
    </button>

    <!-- Result Display -->
    <div id="result-container" class="result-card">
        <div id="success-view">
            <span class="player-name" id="res-nickname">PLAYER_NAME</span>
            <div class="uid-display">UID: <span id="res-uid">00000000</span></div>
            <div class="uid-display" style="font-size: 0.7rem;"><i class="far fa-clock"></i> <span id="res-time"></span></div>
            
            <div class="action-btns">
                <button class="icon-btn" onclick="copyText('res-nickname')"><i class="far fa-copy"></i> Name</button>
                <button class="icon-btn" onclick="copyText('res-uid')"><i class="far fa-copy"></i> UID</button>
                <button class="icon-btn" id="share-btn"><i class="fas fa-share-alt"></i></button>
            </div>
        </div>
        
        <div id="error-view" style="display: none;">
            <i class="fas fa-exclamation-triangle" style="color: var(--error); font-size: 2rem; margin-bottom: 10px;"></i>
            <p id="error-msg">Player Not Found</p>
            <button class="icon-btn" style="margin-top: 10px;" onclick="lookupPlayer()">
                <i class="fas fa-redo"></i> Retry
            </button>
        </div>
    </div>

    <!-- History -->
    <div class="history-section">
        <div class="history-header">
            <span>Recent Searches</span>
            <span style="cursor: pointer; color: var(--error);" id="clear-history">Clear</span>
        </div>
        <div class="history-list" id="history-list">
            <!-- Items injected via JS -->
        </div>
    </div>
</div>

<div class="toast" id="toast">Message here</div>

<script>
    const uidInput = document.getElementById('uid-input');
    const searchBtn = document.getElementById('search-btn');
    const btnText = document.getElementById('btn-text');
    const spinner = document.getElementById('loading-spinner');
    const resultBox = document.getElementById('result-container');
    const successView = document.getElementById('success-view');
    const errorView = document.getElementById('error-view');
    const historyList = document.getElementById('history-list');

    // Auto Focus
    window.onload = () => {
        uidInput.focus();
        renderHistory();
        checkConnection();
    };

    // Online Status Indicator
    function checkConnection() {
        const status = document.getElementById('online-status');
        if(navigator.onLine) {
            status.style.color = "var(--success)";
            status.innerHTML = '<i class="fas fa-circle"></i> Online';
        } else {
            status.style.color = "var(--error)";
            status.innerHTML = '<i class="fas fa-circle"></i> Offline';
        }
    }
    window.addEventListener('online', checkConnection);
    window.addEventListener('offline', checkConnection);

    // Input Clear Button Logic
    uidInput.addEventListener('input', () => {
        document.getElementById('clear-input').style.display = uidInput.value ? 'block' : 'none';
    });

    document.getElementById('clear-input').onclick = () => {
        uidInput.value = '';
        uidInput.focus();
        document.getElementById('clear-input').style.display = 'none';
    };

    // Main Lookup Function
    async function lookupPlayer() {
        const uid = uidInput.value.trim();
        
        if (!uid) {
            showToast("Please enter a valid UID!");
            vibrate(50);
            return;
        }

        // Prevent Spam
        searchBtn.disabled = true;
        spinner.style.display = 'block';
        btnText.innerText = 'FETCHING...';
        resultBox.className = 'result-card'; // Reset display

        // Setup Timeout Controller (10 Seconds)
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 10000);

        // Proxy URL Construction
        const targetUrl = `https://apis.rrrtopup.com/api/v1/player-nickname?id=${uid}&product_id=21`;
        const proxyUrl = "https://api.allorigins.win/raw?url=" + encodeURIComponent(targetUrl);

        console.log("Fetching from Proxy:", proxyUrl);

        try {
            const response = await fetch(proxyUrl, { signal: controller.signal });
            clearTimeout(timeoutId);

            const rawText = await response.text();
            console.log("Raw Response:", rawText);

            if (!rawText || rawText.trim() === "") {
                throw new Error("Empty Response from API");
            }

            let data;
            try {
                data = JSON.parse(rawText);
                console.log("Parsed JSON:", data);
            } catch (e) {
                console.error("JSON Parse Error:", e);
                throw new Error("Invalid Response Format");
            }

            // Success Handling
            if (data && data.nickname) {
                displaySuccess(data.nickname, uid);
                saveToHistory(data.nickname, uid);
                vibrate([100, 50, 100]);
            } else {
                displayError("Player Not Found or Invalid UID");
                vibrate(200);
            }

        } catch (error) {
            console.error("Fetch Error:", error);
            if (error.name === 'AbortError') {
                displayError("Request Timeout. Try again.");
            } else {
                displayError("Network Error or API Failure");
            }
            vibrate(200);
        } finally {
            searchBtn.disabled = false;
            spinner.style.display = 'none';
            btnText.innerText = 'SEARCH PLAYER';
        }
    }

    function displaySuccess(name, uid) {
        resultBox.classList.add('success');
        successView.style.display = 'block';
        errorView.style.display = 'none';
        
        document.getElementById('res-nickname').innerText = name;
        document.getElementById('res-uid').innerText = uid;
        document.getElementById('res-time').innerText = new Date().toLocaleString();
    }

    function displayError(msg) {
        resultBox.classList.add('error');
        successView.style.display = 'none';
        errorView.style.display = 'block';
        document.getElementById('error-msg').innerText = msg;
    }

    // Utilities
    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.innerText = msg;
        toast.style.display = 'block';
        setTimeout(() => { toast.style.display = 'none'; }, 2500);
    }

    function copyText(id) {
        const text = document.getElementById(id).innerText;
        navigator.clipboard.writeText(text);
        showToast("Copied: " + text);
    }

    function vibrate(pattern) {
        if (navigator.vibrate) navigator.vibrate(pattern);
    }

    // History Logic
    function saveToHistory(name, uid) {
        let history = JSON.parse(localStorage.getItem('gamer_history') || '[]');
        // Remove duplicate if exists
        history = history.filter(item => item.uid !== uid);
        // Add to top
        history.unshift({ name, uid, time: new Date().toLocaleTimeString() });
        // Keep last 10
        if (history.length > 10) history.pop();
        localStorage.setItem('gamer_history', JSON.stringify(history));
        renderHistory();
    }

    function renderHistory() {
        const history = JSON.parse(localStorage.getItem('gamer_history') || '[]');
        if (history.length === 0) {
            historyList.innerHTML = '<p style="text-align:center; font-size:0.7rem; color:#666;">No recent searches</p>';
            return;
        }
        historyList.innerHTML = history.map(item => `
            <div class="history-item" onclick="setAndSearch('${item.uid}')">
                <span>${item.name}</span>
                <span style="color:var(--secondary)">${item.uid}</span>
            </div>
        `).join('');
    }

    function setAndSearch(uid) {
        uidInput.value = uid;
        lookupPlayer();
    }

    document.getElementById('clear-history').onclick = () => {
        localStorage.removeItem('gamer_history');
        renderHistory();
        showToast("History Cleared");
    };

    document.getElementById('share-btn').onclick = () => {
        const name = document.getElementById('res-nickname').innerText;
        const uid = document.getElementById('res-uid').innerText;
        const text = `Player Lookup Result:\nName: ${name}\nUID: ${uid}\nFound using Advanced Gamer Lookup.`;
        if (navigator.share) {
            navigator.share({ title: 'Gamer Lookup', text: text });
        } else {
            navigator.clipboard.writeText(text);
            showToast("Result copied to share!");
        }
    };

    // Event Listeners
    searchBtn.addEventListener('click', lookupPlayer);
    uidInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') lookupPlayer();
    });

    // Simple Particle Background
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];

    function initParticles() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        for(let i=0; i<30; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                radius: Math.random() * 2 + 1,
                dx: (Math.random() - 0.5) * 0.5,
                dy: (Math.random() - 0.5) * 0.5
            });
        }
    }

    function animateParticles() {
        ctx.clearRect(0,0, canvas.width, canvas.height);
        ctx.fillStyle = "rgba(138, 43, 226, 0.3)";
        particles.forEach(p => {
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
            ctx.fill();
            p.x += p.dx;
            p.y += p.dy;
            if(p.x < 0 || p.x > canvas.width) p.dx *= -1;
            if(p.y < 0 || p.y > canvas.height) p.dy *= -1;
        });
        requestAnimationFrame(animateParticles);
    }
    initParticles();
    animateParticles();
</script>

</body>
</html>
