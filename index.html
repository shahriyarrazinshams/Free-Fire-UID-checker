<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FF Nickname Checker</title>
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700&family=Oxanium:wght@300;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            --accent-glow: 0 0 15px rgba(37, 117, 252, 0.6);
            --glass: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.15);
            --neon-purple: #bf5af2;
            --neon-blue: #5e5ce6;
            --bg-dark: #0f0c29;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Exo 2', sans-serif;
            background: var(--bg-dark);
            background: linear-gradient(to bottom, #0f0c29, #302b63, #24243e);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
        }

        /* Particles Background */
        #particles {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .app-container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
            position: relative;
        }

        /* Header Section */
        .app-header {
            text-align: center;
            margin-bottom: 30px;
            padding-top: 10px;
        }

        .logo-icon {
            font-size: 45px;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 8px rgba(37, 117, 252, 0.8));
            margin-bottom: 10px;
        }

        .app-header h1 {
            font-family: 'Oxanium', sans-serif;
            font-size: 26px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .app-header p {
            font-size: 12px;
            color: #aaa;
            letter-spacing: 2px;
        }

        /* Search Card */
        .card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 20px;
            animation: fadeIn 0.8s ease-out;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        input[type="number"] {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 2px solid var(--glass-border);
            border-radius: 12px;
            padding: 15px 15px 15px 45px;
            color: #fff;
            font-size: 18px;
            font-family: 'Oxanium', sans-serif;
            transition: 0.3s;
            outline: none;
        }

        input[type="number"]:focus {
            border-color: var(--neon-blue);
            box-shadow: 0 0 15px rgba(94, 92, 230, 0.4);
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #777;
        }

        /* Buttons */
        .btn-search {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: var(--primary-gradient);
            color: white;
            font-weight: bold;
            font-family: 'Oxanium', sans-serif;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
            box-shadow: var(--accent-glow);
            animation: pulse-blue 2s infinite;
        }

        .btn-search:active { transform: scale(0.95); }

        .btn-clear {
            background: transparent;
            border: 1px solid #ff4b2b;
            color: #ff4b2b;
            margin-top: 10px;
            padding: 8px;
            font-size: 12px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
        }

        /* Result Section */
        #result-container { display: none; }

        .result-card {
            background: linear-gradient(135deg, rgba(106, 17, 203, 0.2) 0%, rgba(37, 117, 252, 0.2) 100%);
            border: 2px solid var(--neon-blue);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .server-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #00c853;
            font-size: 10px;
            padding: 3px 8px;
            border-radius: 20px;
            font-weight: bold;
        }

        .player-name {
            font-family: 'Oxanium', sans-serif;
            font-size: 24px;
            font-weight: 800;
            margin: 10px 0;
            color: #fff;
            text-shadow: 0 0 10px var(--neon-blue);
        }

        .player-uid {
            color: #bbb;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .btn-action {
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--glass-border);
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 13px;
            cursor: pointer;
        }

        /* History Section */
        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding: 0 5px;
        }

        .history-item {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 12px 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid transparent;
            transition: 0.3s;
        }

        .history-item:hover {
            border-color: var(--neon-purple);
            background: rgba(191, 90, 242, 0.1);
        }

        /* Skeleton Loading */
        .skeleton {
            background: linear-gradient(90deg, #222 25%, #333 50%, #222 75%);
            background-size: 200% 100%;
            animation: skeleton-loading 1.5s infinite;
            border-radius: 10px;
            height: 40px;
            margin-bottom: 10px;
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            color: white;
            padding: 12px 25px;
            border-radius: 50px;
            font-size: 14px;
            z-index: 1000;
            display: none;
            border: 1px solid var(--neon-blue);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        /* Animations */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes skeleton-loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        @keyframes pulse-blue { 0% { box-shadow: 0 0 0 0 rgba(37, 117, 252, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(37, 117, 252, 0); } 100% { box-shadow: 0 0 0 0 rgba(37, 117, 252, 0); } }

        /* No Spinners for number input */
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

        .footer {
            text-align: center;
            font-size: 11px;
            color: #666;
            margin-top: 20px;
            padding-bottom: 20px;
        }

        .offline-notice {
            background: #ff3b30;
            text-align: center;
            padding: 5px;
            font-size: 12px;
            display: none;
        }
    </style>
</head>
<body>

    <div id="particles"></div>

    <div class="app-container">
        <div id="offline-bar" class="offline-notice">Internet disconnected!</div>

        <!-- Header -->
        <header class="app-header">
            <div class="logo-icon"><i class="fas fa-shield-halved"></i></div>
            <h1>FF Nickname Checker</h1>
            <p>Bangladesh Server Player Lookup</p>
        </header>

        <!-- Main Search Card -->
        <div class="card">
            <div class="input-group">
                <i class="fas fa-user-tag"></i>
                <input type="number" id="uidInput" placeholder="Enter Player UID (e.g. 12345678)" autofocus>
            </div>
            <button class="btn-search" id="searchBtn">
                <span id="btnText">SEARCH PLAYER</span>
                <i class="fas fa-crosshairs"></i>
            </button>
            <button class="btn-clear" onclick="clearInput()">CLEAR</button>
        </div>

        <!-- Skeleton Loader -->
        <div id="skeleton-loader" style="display: none;">
            <div class="card">
                <div class="skeleton"></div>
                <div class="skeleton" style="width: 60%; margin: 0 auto;"></div>
            </div>
        </div>

        <!-- Result Card -->
        <div id="result-container">
            <div class="card result-card">
                <div class="server-badge">BD SERVER</div>
                <div style="font-size: 40px; color: #00c853; margin-bottom: 10px;">
                    <i class="fas fa-circle-check"></i>
                </div>
                <div class="player-name" id="resName">UNKNOWN</div>
                <div class="player-uid" id="resUid">UID: 00000000</div>
                
                <div class="action-buttons">
                    <button class="btn-action" onclick="copyText('resName')">
                        <i class="far fa-copy"></i> Copy Name
                    </button>
                    <button class="btn-action" onclick="copyText('resUid')">
                        <i class="far fa-copy"></i> Copy UID
                    </button>
                </div>
            </div>
        </div>

        <!-- History Section -->
        <div class="history-section">
            <div class="history-header">
                <h3 style="font-family: 'Oxanium'; font-size: 16px;">RECENT SEARCHES</h3>
                <span onclick="clearHistory()" style="color: #ff4b2b; font-size: 12px; cursor: pointer;">Delete All</span>
            </div>
            <div id="historyList">
                <!-- History Items go here -->
            </div>
        </div>

        <footer class="footer">
            &copy; 2026 FF Nickname Checker &bull; Premium Esports Utility
        </footer>
    </div>

    <div id="toast" class="toast">Message here</div>

    <script>
        const searchBtn = document.getElementById('searchBtn');
        const uidInput = document.getElementById('uidInput');
        const resultContainer = document.getElementById('result-container');
        const skeletonLoader = document.getElementById('skeleton-loader');
        const historyList = document.getElementById('historyList');

        // Initial Load
        window.onload = () => {
            loadHistory();
            createParticles();
        };

        // Enter key support
        uidInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') performSearch();
        });

        searchBtn.addEventListener('click', performSearch);

        async function performSearch() {
            const uid = uidInput.value.trim();

            if (!uid) {
                showToast("অনুগ্রহ করে UID দিন!");
                return;
            }

            if (uid.length < 5) {
                showToast("Invalid UID format!");
                return;
            }

            // UI State: Loading
            searchBtn.disabled = true;
            searchBtn.style.opacity = '0.7';
            document.getElementById('btnText').innerText = "SEARCHING...";
            resultContainer.style.display = 'none';
            skeletonLoader.style.display = 'block';

            try {
                const response = await fetch(`https://apis.rrrtopup.com/api/v1/player-nickname?id=${uid}&product_id=21`);
                const data = await response.json();

                if (data && data.nickname) {
                    showResult(data.nickname, uid);
                    saveToHistory(data.nickname, uid);
                } else {
                    showToast("Player Not Found!");
                }
            } catch (error) {
                showToast("Server Busy or Network Error!");
            } finally {
                searchBtn.disabled = false;
                searchBtn.style.opacity = '1';
                document.getElementById('btnText').innerText = "SEARCH PLAYER";
                skeletonLoader.style.display = 'none';
            }
        }

        function showResult(name, uid) {
            document.getElementById('resName').innerText = name;
            document.getElementById('resUid').innerText = uid;
            resultContainer.style.display = 'block';
            resultContainer.scrollIntoView({ behavior: 'smooth' });
        }

        function clearInput() {
            uidInput.value = '';
            uidInput.focus();
            resultContainer.style.display = 'none';
        }

        // History Management
        function saveToHistory(name, uid) {
            let history = JSON.parse(localStorage.getItem('ff_history') || '[]');
            // Remove if already exists
            history = history.filter(item => item.uid !== uid);
            // Add to start
            history.unshift({ name, uid });
            // Keep last 10
            if (history.length > 10) history.pop();
            
            localStorage.setItem('ff_history', JSON.stringify(history));
            loadHistory();
        }

        function loadHistory() {
            const history = JSON.parse(localStorage.getItem('ff_history') || '[]');
            historyList.innerHTML = '';

            if (history.length === 0) {
                historyList.innerHTML = '<p style="text-align:center; color:#555; font-size:12px;">No history available</p>';
                return;
            }

            history.forEach(item => {
                const div = document.createElement('div');
                div.className = 'history-item';
                div.innerHTML = `
                    <div onclick="recheck('${item.uid}')" style="cursor:pointer">
                        <div style="font-weight:bold; font-size:14px; color:#ddd;">${item.name}</div>
                        <div style="font-size:11px; color:#777;">${item.uid}</div>
                    </div>
                    <i class="fas fa-redo-alt" style="color:var(--neon-blue); font-size:12px;"></i>
                `;
                historyList.appendChild(div);
            });
        }

        function recheck(uid) {
            uidInput.value = uid;
            performSearch();
        }

        function clearHistory() {
            if(confirm("সব হিস্টোরি ডিলিট করতে চান?")) {
                localStorage.removeItem('ff_history');
                loadHistory();
                showToast("History Cleared");
            }
        }

        // Utils
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 2500);
        }

        function copyText(id) {
            const text = document.getElementById(id).innerText.replace('UID: ', '');
            navigator.clipboard.writeText(text);
            showToast("Copied to Clipboard!");
        }

        // Background Particles Effect
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 20; i++) {
                const p = document.createElement('div');
                p.style.position = 'absolute';
                p.style.width = '2px';
                p.style.height = '2px';
                p.style.background = 'rgba(255,255,255,0.2)';
                p.style.top = Math.random() * 100 + '%';
                p.style.left = Math.random() * 100 + '%';
                p.style.borderRadius = '50%';
                p.style.animation = `float ${5 + Math.random() * 10}s linear infinite`;
                container.appendChild(p);
            }
        }

        // Connection Detection
        window.addEventListener('offline', () => { document.getElementById('offline-bar').style.display = 'block'; });
        window.addEventListener('online', () => { document.getElementById('offline-bar').style.display = 'none'; });

    </script>

    <style>
        @keyframes float {
            0% { transform: translateY(0) translateX(0); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-100vh) translateX(20px); opacity: 0; }
        }
    </style>
</body>
</html>
